<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Xhopii - Cadastrar Funcionarios</title>
    <link rel="stylesheet" href="funcionario_style.css"/>
</head>
<body>
  <header>
    <a class="header-logo" href="#">
      <img src="img/logo.png" alt="Xhopii Logo" style="width:36px; height:36px; object-fit:contain;"/>
      <span class="logo-text">Xhopii</span>
    </a>
    <a class="header-sair" href="#">Sair</a>
  </header>
  <nav>
    <a href="#">Home</a>
    <a href="cliente.html">Cadastro Cliente</a>
    <a href="Funcionario.html">Cadastro Funcionário</a>
    <a href="#">Cadastro Produto</a>
    <a href="#">Ver Clientes</a>
    <a href="#">Ver Funcionários</a>
    <a href="#">Ver Produtos</a>
  </nav>
  <main>
    <div class="card">
      <h2 class="card-title">Cadastrar Funcionario</h2>

      <div class="form-group">
        <input class="form-input" type="text" placeholder="Nome" />
      </div>
      <div class="form-group">
        <input class="form-input" type="text" placeholder="Sobrenome" />
      </div>
      <div class="form-group">
        <input class="form-input" type="text" placeholder="CPF" />
      </div>
      <div class="form-group">
        <input class="form-input" type="date" />
      </div>
      <div class="form-group">
        <input class="form-input" type="tel" placeholder="Telefone" />
      </div>
      <div class="form-group">
        <input class="form-input" type="text" placeholder="Cargo/Função" />
      </div>
      <div class="form-group">
        <input class="form-input" type="text" placeholder="Salario" />
      </div>
      <div class="form-group">
        <input class="form-input" type="email" placeholder="Email" />
      </div>
      <div class="form-group">
        <input class="form-input" type="password" placeholder="Senha" />
      </div>

      <label class="foto-label">Selecionar foto de perfil:</label>
      <div class="foto-row">
        <button class="btn-escolher" onclick="document.getElementById('file-input').click()">
          Escolher arquivo
        </button>
        <input type="file" id="file-input" accept="image/*"
               onchange="document.getElementById('file-name').textContent = this.files[0]?.name || 'Nenhum arquivo escolhido'" />
        <span class="foto-nenhum" id="file-name">Nenhum arquivo escolhido</span>
      </div>

      <button class="btn-cadastrar">CADASTRAR</button>
    </div>
  </main>

</body>
</html>
